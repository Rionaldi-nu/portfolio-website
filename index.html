<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio single-page untuk electronics and robotics engineer." />
  <title>Portfolio</title>

  <script>
    tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
            },
            boxShadow: {
              soft: '0 18px 55px rgba(25, 22, 17, 0.10)',
              glow: '0 0 34px rgba(0, 229, 255, 0.22)'
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root {
      --bg: #fff8ee;
      --surface: rgba(255, 252, 246, 0.72);
      --surface-strong: rgba(255, 252, 246, 0.92);
      --text: #2f261f;
      --muted: #75675c;
      --line: rgba(135, 95, 72, 0.18);
      --accent: #bd5a3c;
      --accent-soft: rgba(189, 90, 60, 0.12);
      --accent-glow: rgba(189, 90, 60, 0.28);
      --grid: rgba(120, 82, 59, 0.08);
    }

    html.dark {
      --bg: #06111f;
      --surface: rgba(11, 28, 48, 0.66);
      --surface-strong: rgba(12, 30, 52, 0.92);
      --text: #edf7ff;
      --muted: #9fb6c9;
      --line: rgba(139, 226, 255, 0.16);
      --accent: #00e5ff;
      --accent-soft: rgba(0, 229, 255, 0.10);
      --accent-glow: rgba(0, 229, 255, 0.34);
      --grid: rgba(94, 221, 255, 0.08);
    }

    * {
      transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform;
      transition-duration: 300ms;
      transition-timing-function: ease;
    }

    body {
      background:
        radial-gradient(circle at 82% 12%, var(--accent-glow), transparent 26rem),
        radial-gradient(circle at 10% 82%, var(--accent-soft), transparent 24rem),
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 42px 42px, 42px 42px, auto;
      color: var(--text);
    }

    .glass {
      background: var(--surface);
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .section-card {
      background: linear-gradient(145deg, var(--surface-strong), var(--surface));
      border: 1px solid var(--line);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.06);
    }

    .accent-text { color: var(--accent); }
    .muted-text { color: var(--muted); }
    .accent-bg { background: var(--accent); }
    .accent-soft { background: var(--accent-soft); }

    .nav-link.active {
      color: var(--accent);
      transform: scale(1.18);
      background: var(--accent-soft);
      box-shadow: 0 0 26px var(--accent-glow);
    }

    .reveal {
      opacity: 0;
      transform: translateY(26px);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .timeline-dot::before {
      content: "";
      position: absolute;
      left: -2.32rem;
      top: 0.38rem;
      width: 0.85rem;
      height: 0.85rem;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    @media (max-width: 768px) {
      body {
        padding-bottom: 5.75rem;
      }
    }
  </style>
</head>

<body class="min-h-screen font-sans antialiased">
  <button id="theme-toggle" class="glass fixed right-5 top-5 z-50 flex h-12 w-12 items-center justify-center rounded-full text-lg shadow-soft hover:-translate-y-0.5" aria-label="Toggle light and dark mode">
    <i class="fa-solid fa-moon"></i>
  </button>

  <nav class="glass fixed left-5 top-1/2 z-50 flex -translate-y-1/2 flex-col gap-3 rounded-full p-2 shadow-soft md:left-6 max-md:bottom-4 max-md:left-1/2 max-md:top-auto max-md:-translate-x-1/2 max-md:translate-y-0 max-md:flex-row" aria-label="Floating navigation dock">
    <a class="nav-link active flex h-11 w-11 items-center justify-center rounded-full text-base muted-text" href="#home" aria-label="Home"><i class="fa-solid fa-house"></i></a>
    <a class="nav-link flex h-11 w-11 items-center justify-center rounded-full text-base muted-text" href="#about" aria-label="About"><i class="fa-solid fa-user-astronaut"></i></a>
    <a class="nav-link flex h-11 w-11 items-center justify-center rounded-full text-base muted-text" href="#experiences" aria-label="Experiences"><i class="fa-solid fa-timeline"></i></a>
    <a class="nav-link flex h-11 w-11 items-center justify-center rounded-full text-base muted-text" href="#projects" aria-label="Projects"><i class="fa-solid fa-microchip"></i></a>
    <a class="nav-link flex h-11 w-11 items-center justify-center rounded-full text-base muted-text" href="#achievements" aria-label="Achievements"><i class="fa-solid fa-award"></i></a>
    <a class="nav-link flex h-11 w-11 items-center justify-center rounded-full text-base muted-text" href="#contact" aria-label="Contact"><i class="fa-solid fa-paper-plane"></i></a>
  </nav>

  <main class="mx-auto max-w-6xl px-6 md:px-10 lg:px-12">
    <section id="home" class="reveal grid min-h-screen items-center gap-10 pt-20 lg:grid-cols-[1.05fr_0.95fr]">
      <div class="max-w-4xl">
        <p class="mb-5 inline-flex items-center gap-3 rounded-full px-4 py-2 text-sm font-medium accent-soft accent-text">
          <span class="h-2 w-2 rounded-full accent-bg shadow-glow"></span>
          <span id="hero-label"></span>
        </p>
        <h1 id="hero-name" class="max-w-4xl text-5xl font-semibold leading-tight tracking-normal sm:text-6xl lg:text-7xl"></h1>
        <p id="hero-tagline" class="mt-6 max-w-2xl text-xl leading-8 muted-text sm:text-2xl"></p>
        <div class="mt-10 flex flex-wrap items-center gap-4">
          <a id="hero-primary-button" href="#projects" class="inline-flex items-center gap-3 rounded-full px-6 py-3 font-semibold text-white accent-bg shadow-soft hover:-translate-y-1">
            <i class="fa-solid fa-diagram-project"></i>
            <span></span>
          </a>
          <a id="hero-secondary-button" href="#contact" class="glass inline-flex items-center gap-3 rounded-full px-6 py-3 font-semibold hover:-translate-y-1">
            <i class="fa-solid fa-envelope"></i>
            <span></span>
          </a>
        </div>
      </div>

      <div id="profile-card" class="section-card hidden overflow-hidden rounded-2xl p-4">
        <img id="profile-image" class="aspect-[4/5] w-full rounded-xl object-cover" alt="Profile photo" />
      </div>
    </section>

    <section id="about" class="reveal py-24">
      <div class="grid gap-8 lg:grid-cols-[0.9fr_1.1fr]">
        <div>
          <p id="about-eyebrow" class="text-sm font-semibold uppercase tracking-[0.22em] accent-text"></p>
          <h2 id="about-heading" class="mt-3 text-3xl font-semibold sm:text-4xl"></h2>
        </div>
        <div class="section-card rounded-2xl p-7">
          <p id="about-bio" class="leading-8 muted-text"></p>
          <div id="skills-list" class="mt-8 grid gap-3 sm:grid-cols-2"></div>
        </div>
      </div>
    </section>

    <section id="experiences" class="reveal py-24">
      <div class="mb-12 max-w-2xl">
        <p id="experiences-eyebrow" class="text-sm font-semibold uppercase tracking-[0.22em] accent-text"></p>
        <h2 id="experiences-heading" class="mt-3 text-3xl font-semibold sm:text-4xl"></h2>
      </div>
      <div id="experiences-list" class="ml-10 border-l pl-8" style="border-color: var(--line)"></div>
    </section>

    <section id="projects" class="reveal py-24">
      <div class="mb-12 flex flex-col justify-between gap-5 sm:flex-row sm:items-end">
        <div>
          <p id="projects-eyebrow" class="text-sm font-semibold uppercase tracking-[0.22em] accent-text"></p>
          <h2 id="projects-heading" class="mt-3 text-3xl font-semibold sm:text-4xl"></h2>
        </div>
      </div>
      <div id="projects-list" class="grid gap-5 md:grid-cols-2 lg:grid-cols-3"></div>
    </section>

    <section id="achievements" class="reveal py-24">
      <div class="mb-12 max-w-2xl">
        <p id="achievements-eyebrow" class="text-sm font-semibold uppercase tracking-[0.22em] accent-text"></p>
        <h2 id="achievements-heading" class="mt-3 text-3xl font-semibold sm:text-4xl"></h2>
      </div>
      <div id="achievements-list" class="grid gap-5 md:grid-cols-3"></div>
    </section>

    <section id="contact" class="reveal flex min-h-[70vh] items-center py-24">
      <div class="section-card w-full rounded-2xl p-8 text-center sm:p-12">
        <p id="contact-eyebrow" class="text-sm font-semibold uppercase tracking-[0.22em] accent-text"></p>
        <h2 id="contact-heading" class="mt-3 text-3xl font-semibold sm:text-5xl"></h2>
        <p id="contact-description" class="mx-auto mt-5 max-w-2xl leading-8 muted-text"></p>
        <div id="contact-links" class="mt-9 flex justify-center gap-4"></div>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script>
    const root = document.documentElement;
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = themeToggle.querySelector('i');
    const savedTheme = localStorage.getItem('portfolio-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    const setText = (selector, text) => {
      document.querySelector(selector).textContent = text || '';
    };

    const createIcon = (className) => {
      const icon = document.createElement('i');
      icon.className = className;
      return icon;
    };

    // This helper keeps the layout clean when an image path is empty or the file is missing.
    const createImage = (src, alt, className) => {
      if (!src) return null;

      const image = document.createElement('img');
      image.src = src;
      image.alt = alt || '';
      image.className = className;
      image.loading = 'lazy';
      image.onerror = () => image.remove();
      return image;
    };

    const renderPortfolio = () => {
      const data = portfolioData;

      document.title = data.title;
      document.querySelector('meta[name="description"]').setAttribute('content', data.metaDescription);

      setText('#hero-label', data.hero.label);
      setText('#hero-name', data.name);
      setText('#hero-tagline', data.hero.tagline);
      setText('#hero-primary-button span', data.hero.primaryButton);
      setText('#hero-secondary-button span', data.hero.secondaryButton);

      const profileCard = document.querySelector('#profile-card');
      const profileImage = document.querySelector('#profile-image');

      if (data.profileImage) {
        profileImage.src = data.profileImage;
        profileImage.alt = `${data.name} profile photo`;
        profileImage.onerror = () => profileCard.classList.add('hidden');
        profileCard.classList.remove('hidden');
      }

      setText('#about-eyebrow', data.about.eyebrow);
      setText('#about-heading', data.about.heading);
      setText('#about-bio', data.about.bio);

      const skillsList = document.querySelector('#skills-list');
      skillsList.innerHTML = '';

      data.about.skills.forEach((skill) => {
        const skillItem = document.createElement('span');
        skillItem.className = 'rounded-xl border px-4 py-3 text-sm font-medium';
        skillItem.style.borderColor = 'var(--line)';
        skillItem.textContent = skill;
        skillsList.appendChild(skillItem);
      });

      setText('#experiences-eyebrow', data.experiences.eyebrow);
      setText('#experiences-heading', data.experiences.heading);

      const experiencesList = document.querySelector('#experiences-list');
      experiencesList.innerHTML = '';

      data.experiences.items.forEach((item, index) => {
        const article = document.createElement('article');
        article.className = `timeline-dot relative section-card rounded-2xl overflow-hidden p-6 ${index < data.experiences.items.length - 1 ? 'mb-10' : ''}`;

        const image = createImage(item.image, item.role, 'mb-5 h-56 w-full rounded-xl object-cover');
        if (image) article.appendChild(image);

        const period = document.createElement('p');
        period.className = 'text-sm font-semibold accent-text';
        period.textContent = item.period;

        const role = document.createElement('h3');
        role.className = 'mt-2 text-xl font-semibold';
        role.textContent = item.role;

        const description = document.createElement('p');
        description.className = 'mt-3 leading-7 muted-text';
        description.textContent = item.description;

        article.append(period, role, description);
        experiencesList.appendChild(article);
      });

      setText('#projects-eyebrow', data.projects.eyebrow);
      setText('#projects-heading', data.projects.heading);

      const projectsList = document.querySelector('#projects-list');
      projectsList.innerHTML = '';

      data.projects.items.forEach((project) => {
        const article = document.createElement('article');
        article.className = 'section-card group rounded-2xl overflow-hidden p-5 hover:-translate-y-2 hover:shadow-glow';

        const image = createImage(project.image, project.title, 'mb-5 h-52 w-full rounded-xl object-cover');
        if (image) article.appendChild(image);

        if (project.icon) article.appendChild(createIcon(`${project.icon} mb-6 text-3xl accent-text`));

        const title = document.createElement('h3');
        title.className = 'text-xl font-semibold';
        title.textContent = project.title;

        const description = document.createElement('p');
        description.className = 'mt-3 leading-7 muted-text';
        description.textContent = project.description;

        article.append(title, description);

        if (project.url) {
          const link = document.createElement('a');
          link.href = project.url;
          link.target = '_blank';
          link.rel = 'noreferrer';
          link.className = 'mt-5 inline-flex items-center gap-2 rounded-full px-4 py-2 text-sm font-semibold accent-soft accent-text hover:-translate-y-0.5';
          link.innerHTML = `
            <span>${project.linkLabel || 'View Project'}</span>
            <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
          `;
          article.appendChild(link);
        }

        projectsList.appendChild(article);
      });

      setText('#achievements-eyebrow', data.achievements.eyebrow);
      setText('#achievements-heading', data.achievements.heading);

      const achievementsList = document.querySelector('#achievements-list');
      achievementsList.innerHTML = '';

      data.achievements.items.forEach((achievement) => {
        const article = document.createElement('article');
        article.className = 'section-card rounded-2xl overflow-hidden p-5';

        const image = createImage(achievement.image, achievement.title, 'mb-5 h-44 w-full rounded-xl object-cover');
        if (image) article.appendChild(image);

        if (achievement.icon) article.appendChild(createIcon(`${achievement.icon} mb-5 text-3xl accent-text`));

        const title = document.createElement('h3');
        title.className = 'text-lg font-semibold';
        title.textContent = achievement.title;

        const description = document.createElement('p');
        description.className = 'mt-3 text-sm leading-6 muted-text';
        description.textContent = achievement.description;

        article.append(title, description);
        achievementsList.appendChild(article);
      });

      setText('#contact-eyebrow', data.contact.eyebrow);
      setText('#contact-heading', data.contact.heading);
      setText('#contact-description', data.contact.description);

      const contactLinks = document.querySelector('#contact-links');
      contactLinks.innerHTML = '';

      data.contact.links.forEach((link) => {
        const anchor = document.createElement('a');
        anchor.className = 'glass flex h-14 w-14 items-center justify-center rounded-full text-xl hover:-translate-y-1 hover:text-[var(--accent)]';
        anchor.href = link.url;
        anchor.setAttribute('aria-label', link.label);

        if (!link.url.startsWith('mailto:')) {
          anchor.target = '_blank';
          anchor.rel = 'noreferrer';
        }

        anchor.appendChild(createIcon(link.icon));
        contactLinks.appendChild(anchor);
      });
    };

    renderPortfolio();

    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      root.classList.add('dark');
      themeIcon.className = 'fa-solid fa-sun';
    }

    themeToggle.addEventListener('click', () => {
      root.classList.toggle('dark');
      const isDark = root.classList.contains('dark');
      themeIcon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      localStorage.setItem('portfolio-theme', isDark ? 'dark' : 'light');
    });

    const navLinks = [...document.querySelectorAll('.nav-link')];
    const sections = [...document.querySelectorAll('main section')];

    const setActiveLink = (id) => {
      navLinks.forEach((link) => {
        link.classList.toggle('active', link.getAttribute('href') === `#${id}`);
      });
    };

    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) setActiveLink(entry.target.id);
      });
    }, {
      rootMargin: '-38% 0px -52% 0px',
      threshold: 0
    });

    sections.forEach((section) => sectionObserver.observe(section));

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.14
    });

    document.querySelectorAll('.reveal').forEach((element) => revealObserver.observe(element));
  </script>
</body>
</html>
